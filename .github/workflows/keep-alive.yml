name: Supabase Keep-Alive

on:
  schedule:
    # Roda a cada 5 dias às 10:00 UTC para evitar que o projeto pause
    - cron: '0 10 */5 * *'
  workflow_dispatch:  # Permite rodar manualmente se precisar

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "Status HTTP: $STATUS"

          if [ "$STATUS" = "200" ] || [ "$STATUS" = "206" ]; then
            echo "✅ Supabase respondeu corretamente — projeto ativo."
          else
            echo "⚠️ Resposta inesperada: $STATUS"
            exit 1
          fi
